<!--
  Garden & Grace — Test Suite
  The Good Neighbor Guard
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garden & Grace — Test Suite</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#c9d1d9;padding:16px;min-height:100vh;}
    .header{text-align:center;padding:20px 0 16px;border-bottom:1px solid #21262d;margin-bottom:20px;}
    .header h1{font-size:1.3rem;color:#fff;margin-bottom:4px;}
    .header .sub{font-size:0.85rem;color:#8b949e;}
    .summary-bar{text-align:center;padding:16px;border-radius:10px;margin-bottom:20px;font-size:1.1rem;font-weight:700;}
    .summary-bar.good{background:#0d1f0d;border:1px solid #238636;color:#3fb950;}
    .summary-bar.bad{background:#1f0d0d;border:1px solid #da3633;color:#f85149;}
    .summary-bar.running{background:#1a1a0d;border:1px solid #9e6a03;color:#d29922;}
    .controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .btn{padding:10px 18px;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;}
    .btn-primary{background:#238636;color:#fff;}
    .btn-primary:disabled{opacity:0.5;}
    .btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d;}
    .test-card{background:#161b22;border:1px solid #21262d;border-radius:10px;margin-bottom:8px;overflow:hidden;}
    .test-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px;cursor:pointer;}
    .test-row:hover{background:#1c2128;}
    .test-name{font-size:0.9rem;font-weight:500;}
    .test-detail{display:none;padding:0 14px 12px;font-size:0.8rem;color:#8b949e;line-height:1.6;}
    .test-detail.open{display:block;}
    .badge{padding:3px 10px;border-radius:12px;font-size:0.7rem;font-weight:700;letter-spacing:0.04em;white-space:nowrap;}
    .badge-pass{background:#0d1f0d;color:#3fb950;}
    .badge-fail{background:#1f0d0d;color:#f85149;}
    .badge-wait{background:#1a1a0d;color:#d29922;}
    .notes{color:#8b949e;font-size:0.8rem;margin-top:4px;}
    .error{color:#f85149;font-size:0.8rem;margin-top:4px;}
    .section-label{font-size:0.75rem;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:0.12em;padding:12px 0 6px;}
    .live-log{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px;font-family:monospace;font-size:0.75rem;color:#8b949e;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:12px;display:none;}
  </style>
</head>
<body>

<div class="header">
  <h1>🌿 Garden & Grace — Test Suite</h1>
  <div class="sub">Real code. Real checks. Real results.</div>
</div>

<div class="summary-bar running" id="summary">Waiting to run...</div>

<div class="controls">
  <button class="btn btn-primary" id="runBtn" onclick="runTests(false)">Run Tests</button>
  <button class="btn btn-secondary" onclick="runTests(true)">Run + Live Fishing Test</button>
</div>

<div id="results"></div>

<div class="section-label" style="margin-top:20px;">Live Endpoint Inspector</div>
<div class="controls">
  <button class="btn btn-secondary" onclick="liveTest('/features/daily-verse?verse_mode=scripture')">Verse: Scripture</button>
  <button class="btn btn-secondary" onclick="liveTest('/features/daily-verse?verse_mode=sayings')">Verse: Sayings</button>
  <button class="btn btn-secondary" onclick="liveTest('/features/daily-verse?verse_mode=jokes')">Verse: Jokes</button>
  <button class="btn btn-secondary" onclick="liveTest('/features/catches?limit=3')">Recent Catches</button>
  <button class="btn btn-secondary" onclick="liveTest('/usage')">Usage</button>
  <button class="btn btn-secondary" onclick="liveTest('/health')">Health</button>
</div>
<div class="live-log" id="liveLog"></div>

<script>
async function runTests(live) {
  const btn = document.getElementById("runBtn");
  const summary = document.getElementById("summary");
  const container = document.getElementById("results");

  btn.disabled = true;
  summary.textContent = "Running tests...";
  summary.className = "summary-bar running";
  container.innerHTML = "";

  const url = "/test/api" + (live ? "?live=true" : "");

  try {
    const res = await fetch(url);
    const data = await res.json();

    summary.textContent = data.summary + (data.all_pass ? " — All clear" : " — Issues found");
    summary.className = "summary-bar " + (data.all_pass ? "good" : "bad");

    container.innerHTML = data.results.map((r, i) => `
      <div class="test-card">
        <div class="test-row" onclick="this.nextElementSibling.classList.toggle('open')">
          <div>
            <div class="test-name">${r.test}</div>
            ${r.notes ? `<div class="notes">${r.notes}</div>` : ""}
            ${r.error ? `<div class="error">${r.error}</div>` : ""}
          </div>
          <span class="badge ${r.passed ? 'badge-pass' : 'badge-fail'}">${r.passed ? 'PASS' : 'FAIL'}</span>
        </div>
        <div class="test-detail">
          <pre>${JSON.stringify(r, null, 2)}</pre>
        </div>
      </div>
    `).join("");

  } catch (e) {
    summary.textContent = "Could not reach test API";
    summary.className = "summary-bar bad";
    container.innerHTML = `<div class="test-card"><div class="test-row"><div><div class="test-name">Backend unreachable</div><div class="error">${e.message}</div></div><span class="badge badge-fail">FAIL</span></div></div>`;
  }

  btn.disabled = false;
}

async function liveTest(path) {
  const log = document.getElementById("liveLog");
  log.style.display = "block";
  log.textContent = "GET " + path + "\n\n";

  try {
    const res = await fetch(path);
    log.textContent += "Status: " + res.status + "\n\n";
    const data = await res.json();
    log.textContent += JSON.stringify(data, null, 2);
  } catch (e) {
    log.textContent += "ERROR: " + e.message;
  }
}
</script>

</body>
</html>
